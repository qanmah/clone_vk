{% extends 'base.html' %}

{% block content %}

<h1>Добро пожаловать в нашу соцсеть</h1>

{% if user.is_authenticated %}
    <p>Вы вошли как <b>{{ user.username }}</b></p>

    <a href="/profile/{{ user.username }}">
        👉 Перейти в мой профиль
    </a>

{% else %}
    <p>Чтобы начать — войдите или зарегистрируйтесь</p>

    <a href="/login/">Войти</a>
    <br>
    <a href="/register/">Регистрация</a>
{% endif %}

{% endblock %}
